# Site
title: Jarod Leo
subtitle: Code, Research, Life
description: Jarod Leo 的个人网站，记录技术、研究、项目和生活。
keywords: Jarod Leo, blog, Hexo, GitHub Pages, programming, research
author: Jarod Leo
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://www.jarodleo.top
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - admin/**

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js

highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false

prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home
index_generator:
  path: ''
  per_page: 8
  order_by: -date

# Archive
archive_generator:
  per_page: 0
  yearly: true
  monthly: true
  daily: false
  order_by: -date

# Category & Tag
category_generator:
  per_page: 10
tag_generator:
  per_page: 10

# Extensions
theme: fluid

feed:
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content: true

sitemap:
  path: sitemap.xml

search:
  path: local-search.xml
  field: post
  content: true
  format: html
